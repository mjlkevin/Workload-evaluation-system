openapi: 3.1.0
info:
  title: Workload Evaluation API
  version: 0.1.0
  description: >
    本地工作量评估系统 API。响应统一为 { code, message, data, requestId? }。

    **鉴权（以运行代码为准）**：当前实现使用 JWT，请求头 `Authorization: Bearer <token>`。
    本文档中仍出现的 `X-Role` 参数为历史草稿，**运行时不再作为权限依据**。

    **未在本文档中展开的已实现端点**（完整列表见仓库
    `03_技术设计/系统演进/实现与文档对齐说明.md`）包括但不限于：
    `/api/v1/auth/*`、`/api/v1/versions/*`、`/api/v1/ai/parse-basic-info`、
    `/api/v1/teams/*`、`GET /api/v1/wbs`；
    下载路径为 `GET /downloads/{fileName}`（非 `/api/v1` 前缀）。

    **`/api/v1/agent/*` 说明**：当前主线运行时**未挂载** Agent 高层路由；历史设计与待办见
    `00_项目治理/里程碑与计划/项目开发TODO.md`。对外集成请使用既有估算与会话接口。
servers:
  - url: http://localhost:3000
    description: Local API server

tags:
  - name: Health
  - name: Versions
  - name: Templates
  - name: RuleSets
  - name: Estimates
  - name: Sessions
  - name: Exports
  - name: Teams
  - name: Wbs

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/templates:
    get:
      tags: [Templates]
      summary: 获取模板列表
      operationId: getTemplates
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"

  /api/v1/templates/{templateId}:
    get:
      tags: [Templates]
      summary: 获取模板详情
      operationId: getTemplateDetail
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateDetailResponse"
        "400":
          description: 参数或资源错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/templates/import-json:
    post:
      tags: [Templates]
      summary: 导入模板 JSON（admin）
      operationId: importTemplateJson
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateDetail"
      responses:
        "200":
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkResponse"
        "400":
          description: 失败（含权限不足）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/templates/import-excel:
    post:
      tags: [Templates]
      summary: 导入模板 Excel（admin）
      operationId: importTemplateExcel
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                templateName:
                  type: string
                templateVersion:
                  type: string
                templateId:
                  type: string
                sheetNames:
                  type: string
                  description: 多 sheet 时可逗号分隔
                sheetName:
                  type: string
      responses:
        "200":
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/rule-sets/active:
    get:
      tags: [RuleSets]
      summary: 获取当前激活规则集
      operationId: getActiveRuleSet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleSetResponse"

  /api/v1/rule-sets/meta:
    get:
      tags: [RuleSets]
      summary: 获取规则元信息
      operationId: getRuleSetMeta
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleSetMetaResponse"

  /api/v1/rule-sets/import-json:
    post:
      tags: [RuleSets]
      summary: 导入规则 JSON（admin）
      operationId: importRuleSetJson
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleSet"
      responses:
        "200":
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/estimates/calculate:
    post:
      tags: [Estimates]
      summary: 计算估算结果
      operationId: calculateEstimate
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateRequest"
      responses:
        "200":
          description: 计算成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResponse"
        "400":
          description: 参数错误/规则错误/权限错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/estimates/calculate-and-export:
    post:
      tags: [Estimates]
      summary: 计算并导出（excel/pdf）
      operationId: calculateAndExport
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/CalculateRequest"
                - type: object
                  properties:
                    exportType:
                      type: string
                      enum: [excel, pdf]
      responses:
        "200":
          description: 成功，返回下载地址
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/estimates/export/excel:
    post:
      tags: [Estimates]
      summary: 导出 Excel
      operationId: exportEstimateExcel
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/estimates/export/pdf:
    post:
      tags: [Estimates]
      summary: 导出 PDF
      operationId: exportEstimatePdf
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/exports/history:
    get:
      tags: [Exports]
      summary: 获取导出历史
      operationId: getExportHistory
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportHistoryResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/sessions/start:
    post:
      tags: [Sessions]
      summary: 开始会话态估算
      operationId: startSession
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId, ruleSetId]
              properties:
                templateId:
                  type: string
                ruleSetId:
                  type: string
      responses:
        "200":
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStartResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/sessions/{sessionId}/calculate:
    post:
      tags: [Sessions]
      summary: 会话态估算（无需重复传 templateId/ruleSetId）
      operationId: sessionCalculate
      parameters:
        - $ref: "#/components/parameters/XRoleHeader"
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userCount, difficultyFactor, orgCount, orgSimilarityFactor, items]
              properties:
                userCount:
                  type: integer
                difficultyFactor:
                  type: number
                orgCount:
                  type: integer
                orgSimilarityFactor:
                  type: number
                  minimum: 0
                  maximum: 1
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/CalculateItem"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResponse"
        "400":
          description: 失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions:
    get:
      tags: [Versions]
      summary: 查询当前用户版本列表
      operationId: listVersions
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [requirementImport, assessment, resource, dev, global]
        - name: templateId
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionListResponse"
        "400":
          description: 参数错误或权限不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Versions]
      summary: 创建版本记录
      operationId: createVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionCreateRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionSingleResponse"
        "400":
          description: 参数错误或权限不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 版本号冲突等业务冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{recordId}/status:
    patch:
      tags: [Versions]
      summary: 更新版本状态（draft/reviewed/published）
      operationId: updateVersionStatus
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, reviewed, published]
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionSingleResponse"
        "400":
          description: 参数错误或权限不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 记录不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{id}/checkout:
    post:
      tags: [Versions]
      summary: 检出版本（排他锁）
      operationId: checkoutVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 检出成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionSingleResponse"
        "409":
          description: 当前状态不允许检出
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{id}/checkin:
    post:
      tags: [Versions]
      summary: 检入版本（释放锁并递增小版本）
      operationId: checkinVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: 检入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionCheckinResponse"
        "403":
          description: 非检出人不能检入
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 当前状态不允许检入
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{id}/undo-checkout:
    post:
      tags: [Versions]
      summary: 撤销检出（恢复至上次检入快照）
      operationId: undoCheckoutVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 撤销成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionSingleResponse"
        "403":
          description: 非检出人不能撤销检出
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 当前状态不允许撤销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{id}/promote:
    post:
      tags: [Versions]
      summary: 升版（当前记录归档并创建新记录）
      operationId: promoteVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 升版成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionPromoteResponse"
        "409":
          description: 当前状态不允许升版
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{id}/force-unlock:
    patch:
      tags: [Versions]
      summary: 管理员强制解锁
      operationId: forceUnlockVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 解锁成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionForceUnlockResponse"
        "403":
          description: 仅管理员可操作
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 当前状态无需解锁
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/versions/{type}/{versionCode}:
    delete:
      tags: [Versions]
      summary: 删除版本（若被总方案引用则拒绝）
      operationId: deleteVersion
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [requirementImport, assessment, resource, dev, global]
        - name: versionCode
          in: path
          required: true
          schema:
            type: string
        - name: templateId
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDeleteResponse"
        "409":
          description: 被总方案引用等业务冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/wbs:
    get:
      tags: [Wbs]
      summary: WBS 只读派生列表（基于当前用户最新总方案 GL-）
      description: >
        无独立 WBS 持久化：服务端根据 `config/versions/records.json` 中该用户最新一条
        `type=global` 记录，生成占位任务行（日期与状态为演示口径，随实现调整）。
      operationId: getWbsDerived
      responses:
        "200":
          description: 成功；无总方案时 `data` 为空数组
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WbsListResponse"
        "401":
          description: 未登录或凭证失效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/teams:
    post:
      tags: [Teams]
      summary: 创建团队（P0 草案，当前实现为业务错误统一 400）
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamCreateRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "401":
          description: 未登录或凭证失效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: 业务校验或权限拒绝（例如 code=40301 / 42201 / 40909）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/teams/{teamId}:
    get:
      tags: [Teams]
      summary: 获取团队详情（P0 草案）
      operationId: getTeam
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "401":
          description: 未登录或凭证失效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: 业务校验或权限拒绝（例如 code=40301 / 40401 / 40909）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/teams/{teamId}/members:
    post:
      tags: [Teams]
      summary: 添加团队成员（P0 草案）
      operationId: addTeamMember
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpsertRequest"
      responses:
        "200":
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "401":
          description: 未登录或凭证失效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: 业务校验或权限拒绝（例如 code=40301 / 42201 / 40909）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/teams/{teamId}/members/{userId}:
    patch:
      tags: [Teams]
      summary: 调整成员角色（P0 草案）
      operationId: updateTeamMemberRole
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberRoleUpdateRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "401":
          description: 未登录或凭证失效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: 业务校验或权限拒绝（例如 code=40301 / 40401 / 40909）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Teams]
      summary: 移除团队成员（P0 草案）
      operationId: removeTeamMember
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 移除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkResponse"
        "401":
          description: 未登录或凭证失效
          content:
            application/json:
              schema:
