components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 登录 `POST /api/v1/auth/login` 获取 token，请求头 `Authorization: Bearer <token>`
  parameters:
    XRoleHeader:
      name: X-Role
      in: header
      required: false
      schema:
        type: string
        enum: [admin, operator]
      description: >
        **[已废弃 / 勿依赖]** 历史草稿字段。当前实现以 JWT 内用户角色为准，服务端不信任此头。
    IdempotencyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 导出接口幂等键。相同 payload + 相同 key 会复用结果。

  schemas:
    GenericOkResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          additionalProperties: true
      required: [code, message, data]

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        requestId:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
            required: [field, reason]
      required: [code, message, details, requestId]

    VersionRecord:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [requirementImport, assessment, resource, dev, global]
        versionCode:
          type: string
        templateId:
          type: string
        ownerUserId:
          type: string
        status:
          type: string
          enum: [draft, reviewed, published]
        payload:
          type: object
          additionalProperties: true
        checkoutStatus:
          type: string
          enum: [checked_in, checked_out]
        versionDocStatus:
          type: string
          enum: [drafting, reviewed]
        checkedOutByUserId:
          type: string
        checkedOutByUsername:
          type: string
        checkoutAt:
          type: string
        majorLetter:
          type: string
        minorNumber:
          type: integer
        baseCode:
          type: string
        isHistoricalArchive:
          type: boolean
        archivedAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, type, versionCode, templateId, ownerUserId, status, payload, checkoutStatus, versionDocStatus, majorLetter, minorNumber, baseCode, isHistoricalArchive, createdAt, updatedAt]

    VersionCreateRequest:
      type: object
      required: [type, versionCode, status]
      properties:
        type:
          type: string
          enum: [requirementImport, assessment, resource, dev, global]
        versionCode:
          type: string
        templateId:
          type: string
          default: default
        status:
          type: string
          enum: [draft, reviewed, published]
        payload:
          type: object
          additionalProperties: true

    VersionSingleResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          properties:
            record:
              $ref: "#/components/schemas/VersionRecord"
          required: [record]
      required: [code, message, data]

    VersionListResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/VersionRecord"
          required: [items]
      required: [code, message, data]

    VersionCheckinResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          properties:
            record:
              $ref: "#/components/schemas/VersionRecord"
            versionCode:
              type: string
          required: [record, versionCode]
      required: [code, message, data]

    VersionPromoteResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          properties:
            archived:
              $ref: "#/components/schemas/VersionRecord"
            newRecord:
              $ref: "#/components/schemas/VersionRecord"
          required: [archived, newRecord]
      required: [code, message, data]

    VersionForceUnlockResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          properties:
            record:
              $ref: "#/components/schemas/VersionRecord"
            unlockedBy:
              type: string
          required: [record, unlockedBy]
      required: [code, message, data]

    VersionDeleteResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          type: object
          properties:
            deleted:
              type: boolean
            record:
              $ref: "#/components/schemas/VersionRecord"
          required: [deleted, record]
      required: [code, message, data]

    TemplateListItem:
      type: object
      properties:
        templateId:
          type: string
        templateVersion:
          type: string
        templateName:
          type: string
      required: [templateId, templateVersion, templateName]

    TemplateGroup:
      type: object
      properties:
        groupId:
          type: string
        groupName:
          type: string
      required: [groupId, groupName]

    TemplateItem:
      type: object
      properties:
        templateItemId:
          type: string
        groupId:
          type: string
        itemName:
          type: string
        standardDays:
          type: number
        sheetName:
          type: string
        cloudProduct:
          type: string
        skuName:
          type: string
        appGroup:
          type: string
        deliveryModule:
          type: string
        deliveryPoint:
          type: string
        deliveryDesc:
          type: string
        evalDesc:
          type: string
        defaultIncluded:
          type: boolean
      required: [templateItemId, groupId, itemName, standardDays]

    TemplateDetail:
      type: object
      properties:
        templateId:
          type: string
        templateVersion:
          type: string
        templateName:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TemplateGroup"
        items:
          type: array
          items:
            $ref: "#/components/schemas/TemplateItem"
      required: [templateId, templateVersion, templateName, groups, items]

    UserCountTier:
      type: object
      properties:
        min:
          type: integer
        max:
          type: integer
        factor:
          type: number
      required: [min, max, factor]

    BaseRule:
      type: object
      properties:
        userCountTiers:
          type: array
          items:
            $ref: "#/components/schemas/UserCountTier"
        difficultyFactorList:
          type: array
          items:
            type: number
        userIncrementRounding:
          type: string
          enum: [none, ceil_int]
      required: [userCountTiers, difficultyFactorList]

    OrgIncrementRule:
      type: object
      properties:
        enabled:
          type: boolean
        factor:
          type: number
      required: [enabled]

    RuleSet:
      type: object
      properties:
        ruleSetId:
          type: string
        ruleVersion:
          type: string
        pipelineVersion:
          type: string
        pipeline:
          type: array
          items:
            type: string
        baseRule:
          $ref: "#/components/schemas/BaseRule"
        orgIncrementRule:
          $ref: "#/components/schemas/OrgIncrementRule"
      required: [ruleSetId, ruleVersion, pipelineVersion, pipeline, baseRule, orgIncrementRule]

    RuleSetMeta:
      type: object
      properties:
        grouping:
          type: array
          items:
            type: string
        itemRule:
          type: array
          items:
            type: string
        baseRule:
          $ref: "#/components/schemas/BaseRule"
        orgIncrementRule:
          $ref: "#/components/schemas/OrgIncrementRule"
        pipeline:
          type: array
          items:
            type: string
      required: [grouping, itemRule, baseRule, orgIncrementRule, pipeline]

    CalculateItem:
      type: object
      properties:
        templateItemId:
          type: string
        included:
          type: boolean
      required: [templateItemId, included]

    CalculateRequest:
      type: object
      required: [templateId, ruleSetId, userCount, difficultyFactor, orgCount, orgSimilarityFactor, items]
      properties:
        templateId:
          type: string
        ruleSetId:
          type: string
        userCount:
          type: integer
          minimum: 0
        difficultyFactor:
          type: number
        orgCount:
          type: integer
          minimum: 0
        orgSimilarityFactor:
          type: number
          minimum: 0
          maximum: 1
        items:
          type: array
          description: 必须覆盖模板中的所有 templateItemId
          items:
            $ref: "#/components/schemas/CalculateItem"

    EstimateResult:
      type: object
      properties:
        templateId:
          type: string
        ruleSetId:
          type: string
        templateVersion:
          type: string
        ruleVersion:
          type: string
        pipelineVersion:
          type: string
        baseDays:
          type: number
        userIncrementDays:
          type: number
        difficultyIncrementDays:
          type: number
        orgIncrementDays:
          type: number
        totalDays:
          type: number
        calculationBreakdown:
          type: object
          additionalProperties: true
        groupSubtotals:
          type: array
          items:
            type: object
            additionalProperties: true
        itemResults:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - templateId
        - ruleSetId
        - templateVersion
        - ruleVersion
        - pipelineVersion
        - baseDays
        - userIncrementDays
        - difficultyIncrementDays
        - orgIncrementDays
        - totalDays
        - calculationBreakdown
        - groupSubtotals
        - itemResults

    ExportResult:
      type: object
      properties:
        totalDays:
          type: number
        downloadUrl:
          type: string
        expireAt:
          type: string
      required: [totalDays, downloadUrl, expireAt]

    ExportHistoryItem:
      type: object
      properties:
        fileName:
          type: string
        exportType:
          type: string
          enum: [excel, pdf]
        sizeBytes:
          type: integer
        modifiedAt:
          type: string
        downloadUrl:
          type: string
      required: [fileName, exportType, sizeBytes, modifiedAt, downloadUrl]

    HealthResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          type: object
          properties:
            service:
              type: string
            status:
              type: string
          required: [service, status]
      required: [code, message, data]

    TemplateListResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          type: object
          properties:
            list:
              type: array
              items:
                $ref: "#/components/schemas/TemplateListItem"
          required: [list]
      required: [code, message, data]

    TemplateDetailResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          $ref: "#/components/schemas/TemplateDetail"
      required: [code, message, data]

    RuleSetResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          $ref: "#/components/schemas/RuleSet"
      required: [code, message, data]

    RuleSetMetaResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          $ref: "#/components/schemas/RuleSetMeta"
      required: [code, message, data]

    EstimateResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/EstimateResult"
      required: [code, message, data]

    ExportResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/ExportResult"
      required: [code, message, data]

    ExportHistoryResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          type: object
          properties:
            page:
              type: integer
            pageSize:
              type: integer
            total:
              type: integer
            items:
              type: array
              items:
                $ref: "#/components/schemas/ExportHistoryItem"
          required: [page, pageSize, total, items]
      required: [code, message, data]

    SessionStartResponse:
      type: object
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: ok
        data:
          type: object
          properties:
            sessionId:
              type: string
            templateId:
              type: string
            ruleSetId:
              type: string
            expiresAt:
              type: string
          required: [sessionId, templateId, ruleSetId, expiresAt]
      required: [code, message, data]

    WbsItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        moduleKey:
          type: string
          enum: [requirementImport, assessment, dev, resource]
        taskName:
          type: string
        owner:
          type: string
        linkedVersionCode:
          type: string
        sourceGlobalVersionCode:
          type: string
        sourceGlobalRecordId:
          type: string
        isDerived:
          type: boolean
        start:
          type: string
          description: YYYY-MM-DD
        end:
          type: string
          description: YYYY-MM-DD
        status:
