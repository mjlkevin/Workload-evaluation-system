# 最小可复现编排：API + 主前端（Next）。
# 使用：在仓库根目录执行 `docker compose up --build`
# 访问：Web http://localhost:3001 ，API http://localhost:3000/api/v1/health
# 持久化：默认挂载 ./config 到 API 容器，避免镜像内状态丢失。

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
    volumes:
      - ./config:/repo/config

  web:
    build:
      context: ./ui/V0_SAAS
      dockerfile: Dockerfile
      args:
        WORKLOAD_API_ORIGIN: http://api:3000
    ports:
      - "3001:3001"
    environment:
      WORKLOAD_API_ORIGIN: http://api:3000
    depends_on:
      - api
